<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreadPoint</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Source+Sans+3:wght@400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
      padding: 2rem;
    }
    .container {
      text-align: center;
    }
    .logo-icon {
      margin-bottom: 1.5rem;
    }
    .brand-name {
      font-family: 'Racing Sans One', cursive;
      font-size: 3.5rem;
      color: #ac2929;
      line-height: 1.1;
      margin-bottom: 0.25rem;
    }
    .slogan {
      font-size: 1.2rem;
      color: #144579;
      letter-spacing: 0.1em;
      margin-bottom: 2.5rem;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: #ac2929;
      margin: 0 auto 2rem;
      opacity: 0.3;
    }
    .tagline {
      font-size: 0.85rem;
      color: #999;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo Icon -->
    <svg class="logo-icon" width="80" height="90" viewBox="0 0 100 112" xmlns="http://www.w3.org/2000/svg">
      <g fill="#ac2929">
        <circle cx="43" cy="22" r="21.7"/>
        <circle cx="12.7" cy="49.8" r="11.9"/>
        <circle cx="75.7" cy="60" r="23.5"/>
        <circle cx="30.6" cy="88" r="23.9"/>
      </g>
    </svg>

    <!-- Brand Name -->
    <div class="brand-name">ThreadPoint</div>

    <!-- Slogan -->
    <div class="slogan">Work Better with AI</div>

    <div class="divider"></div>
    <p class="tagline">— Under Construction —</p>
  </div>
</body>
</html>
