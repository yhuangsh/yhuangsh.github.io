<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreadPoint</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    .logo {
      max-width: 100%;
      height: auto;
      margin-bottom: 2rem;
    }
    .tagline {
      font-size: 0.9rem;
      color: #999;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.svg" alt="ThreadPoint" class="logo">
    <p class="tagline">— Under Construction —</p>
  </div>
</body>
</html>
